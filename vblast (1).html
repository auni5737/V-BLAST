<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V-Blast — Pengembaraan Huruf Vokal</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Comic Sans MS', 'Chalkboard SE', cursive; overflow-x: hidden; min-height: 100vh; }

#app { position: relative; overflow: hidden; min-height: 100vh; }

.forest-bg {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(180deg, #1a6b2e 0%, #1e7a34 8%, #228B3A 20%, #2d9e47 35%, #1f7a30 55%, #195f25 75%, #144d1e 100%);
}
.sky-glow { position: fixed; top: 0; left: 0; right: 0; height: 200px; z-index: 1; background: linear-gradient(180deg, #0d3d1a 0%, transparent 100%); }

.firefly { position: fixed; width: 4px; height: 4px; background: #ffe066; border-radius: 50%; animation: fireflyFloat var(--dur,4s) ease-in-out infinite; opacity: 0; z-index: 1; }
@keyframes fireflyFloat {
  0%   { opacity:0; transform:translate(0,0) scale(1); }
  20%  { opacity:1; }
  50%  { opacity:0.8; transform:translate(var(--tx,10px),var(--ty,-20px)) scale(1.3); }
  80%  { opacity:1; }
  100% { opacity:0; transform:translate(var(--tx2,5px),var(--ty2,10px)) scale(0.8); }
}

.vine { position: fixed; top: 0; width: 3px; border-radius: 2px; background: linear-gradient(180deg,#1a5c1a,#2d8a2d,#1a5c1a); animation: vineSwing var(--vs,3s) ease-in-out infinite; transform-origin: top center; z-index: 1; }
.vine::after { content:''; position:absolute; bottom:-8px; left:50%; transform:translateX(-50%); width:10px; height:10px; background:#2d8a2d; border-radius:50%; }
@keyframes vineSwing { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg)} }

.leaf { position: fixed; border-radius: 50% 0 50% 0; animation: leafFloat var(--lf,5s) ease-in-out infinite; z-index: 1; }
@keyframes leafFloat { 0%,100%{transform:rotate(var(--lr,0deg)) translateY(0)} 50%{transform:rotate(calc(var(--lr,0deg) + 8deg)) translateY(-6px)} }

.bg-tree { position: fixed; bottom: 0; display:flex; flex-direction:column; align-items:center; z-index: 1; }
.bg-tree-trunk { background: #0d2e0d; border-radius: 3px; margin: 0 auto; }
.bg-tree-top { width:0; height:0; border-left:var(--tw,50px) solid transparent; border-right:var(--tw,50px) solid transparent; }
.bg-tree-t1 { border-bottom:var(--th,70px) solid #0f3c15; margin-top:-20px; margin-left:calc(-1 * var(--tw,50px)); }
.bg-tree-t2 { border-bottom:calc(var(--th,70px)*1.2) solid #0d3412; margin-top:-28px; margin-left:calc(-1 * var(--tw,50px)); }
.bg-tree-t3 { border-bottom:calc(var(--th,70px)*1.0) solid #0b2a0f; margin-top:-22px; margin-left:calc(-1 * var(--tw,50px)); }

.ground { position: fixed; bottom:0; left:0; right:0; height:60px; background:#0d2e0d; border-radius:60% 60% 0 0 / 20px 20px 0 0; z-index:1; }
.ground-stripe { position:absolute; bottom:0; left:0; right:0; height:30px; background:#0f3a10; border-radius:50% 50% 0 0 / 14px 14px 0 0; }
.mushroom { position:fixed; bottom:55px; z-index:2; }
.mushroom-cap { height:10px; border-radius:50% 50% 0 0; }
.mushroom-stem { width:7px; height:8px; background:#f5e6c8; margin:0 auto; border-radius:0 0 3px 3px; }

/* ── SCREENS ── */
.screen { position: relative; z-index: 10; min-height: 100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }

/* NAME SCREEN */
.name-card {
  background: rgba(5,25,8,0.88);
  border: 3px solid #4ade80;
  border-radius: 24px;
  padding: 36px 32px 32px;
  max-width: 420px; width: 100%;
  text-align: center;
  box-shadow: 0 0 50px rgba(74,222,128,0.2), 0 0 0 1px rgba(74,222,128,0.1);
}
.name-logo { font-size: 42px; font-weight: 900; color: #86efac; text-shadow: 0 0 30px rgba(74,222,128,0.7), 3px 3px 0 #14532d; letter-spacing: 2px; margin-bottom: 4px; }
.name-tagline { font-size: 13px; color: #6ee7b7; margin-bottom: 20px; opacity: 0.8; }
.animal-parade { font-size: 30px; margin-bottom: 20px; letter-spacing: 6px; animation: paradeWiggle 1.5s ease-in-out infinite; }
@keyframes paradeWiggle { 0%,100%{transform:translateY(0)} 25%{transform:translateY(-4px)} 75%{transform:translateY(4px)} }
.name-label { font-size: 14px; color: #86efac; font-weight: 700; margin-bottom: 8px; text-align: left; }
.name-input {
  width: 100%; padding: 14px 18px;
  font-family: inherit; font-size: 20px; font-weight: 700;
  text-align: center;
  background: rgba(255,255,255,0.07);
  border: 2px solid #4ade80; border-radius: 14px;
  color: #fff; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  margin-bottom: 16px;
}
.name-input::placeholder { color: rgba(255,255,255,0.25); font-weight: 400; font-size: 16px; }
.name-input:focus { border-color: #86efac; box-shadow: 0 0 0 4px rgba(74,222,128,0.2); }
.start-btn {
  width: 100%; padding: 15px;
  font-family: inherit; font-size: 21px; font-weight: 900;
  background: linear-gradient(135deg,#22c55e,#16a34a);
  border: none; border-radius: 14px; color: #fff; cursor: pointer;
  box-shadow: 0 5px 0 #14532d, 0 0 24px rgba(34,197,94,0.35);
  transition: transform 0.15s, box-shadow 0.15s;
  letter-spacing: 0.5px;
}
.start-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 7px 0 #14532d, 0 0 32px rgba(34,197,94,0.45); }
.start-btn:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 1px 0 #14532d; }
.start-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.name-deco { font-size: 12px; color: #6ee7b7; margin-top: 16px; opacity: 0.65; letter-spacing: 1px; }

/* GAME SCREEN */
#game-screen { display: none; }
.game-wrapper { position: relative; z-index: 10; width: 100%; max-width: 680px; margin: 0 auto; padding: 0 12px; }
.game-header { text-align: center; padding: 14px 10px 6px; }
.game-logo { font-size: 24px; font-weight: 900; color: #86efac; text-shadow: 0 0 14px rgba(74,222,128,0.6), 2px 2px 0 #14532d; letter-spacing: 1px; }
.player-tag { display:inline-block; background:rgba(34,197,94,0.2); border:1.5px solid #4ade80; border-radius:20px; padding:3px 14px; font-size:13px; color:#86efac; margin-top:4px; font-weight:700; }

.scoreboard { display:flex; align-items:center; gap:10px; padding:4px 14px 8px; }
.score-box { display:flex; flex-direction:column; align-items:center; background:rgba(5,25,8,0.7); border-radius:14px; padding:6px 12px; min-width:62px; border:2px solid; flex-shrink:0; }
.score-betul-box { border-color:rgba(34,197,94,0.5); }
.score-salah-box { border-color:rgba(239,68,68,0.5); }
.score-icon { font-size:18px; line-height:1; }
.score-num { font-size:26px; font-weight:900; line-height:1.1; }
.score-betul-box .score-num { color:#86efac; text-shadow:0 0 10px rgba(74,222,128,0.6); }
.score-salah-box .score-num { color:#fca5a5; text-shadow:0 0 10px rgba(239,68,68,0.5); }
.score-lbl { font-size:11px; font-weight:700; margin-top:1px; }
.score-betul-box .score-lbl { color:#4ade80; }
.score-salah-box .score-lbl { color:#f87171; }
.score-mid { flex:1; display:flex; flex-direction:column; gap:5px; align-items:center; }
.score-num.pop { animation:scorePop 0.35s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes scorePop { 0%{transform:scale(1)} 50%{transform:scale(1.45)} 100%{transform:scale(1)} }
.progress-bar { width:100%; height:10px; background:rgba(255,255,255,0.1); border-radius:10px; overflow:hidden; border:1px solid rgba(74,222,128,0.2); }
.progress-fill { height:100%; background:linear-gradient(90deg,#22c55e,#86efac); border-radius:10px; transition:width 0.4s ease; width:0%; }
.stars-row { display:flex; justify-content:center; gap:5px; }
.star-icon { font-size:18px; }

.tabs { display:flex; justify-content:center; gap:8px; padding:4px 12px 6px; }
.tab-btn { padding:8px 13px; border-radius:20px; border:2px solid rgba(74,222,128,0.35); background:rgba(5,25,8,0.55); color:#86efac; font-family:inherit; font-size:12px; font-weight:700; cursor:pointer; transition:all 0.2s; line-height:1.3; }
.tab-btn:hover { background:rgba(74,222,128,0.18); }
.tab-btn.active { background:#22c55e; color:#fff; border-color:#4ade80; box-shadow:0 0 14px rgba(34,197,94,0.45); }
.tab-btn.locked { opacity:0.4; cursor:not-allowed; }

.game-content { padding:6px 12px 80px; min-height:400px; }
.level-desc { text-align:center; background:rgba(5,25,8,0.78); border-radius:14px; padding:9px 16px; margin-bottom:12px; font-size:14px; color:#86efac; font-weight:700; border:2px solid rgba(74,222,128,0.28); }

/* Letters grid L1 */
.letters-grid { display:flex; flex-wrap:wrap; justify-content:center; gap:9px; max-width:540px; margin:0 auto; }
.balloon { width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:21px; font-weight:900; cursor:pointer; border:3px solid rgba(255,255,255,0.5); user-select:none; animation:floatUp 2s ease-in-out infinite; }
.balloon:hover { filter:brightness(1.15); }
.balloon.popped { animation:popAnim 0.4s ease forwards; pointer-events:none; }
.balloon.wrong-shake { animation:shake 0.4s ease; }
@keyframes floatUp { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes popAnim { 0%{transform:scale(1);opacity:1} 45%{transform:scale(1.5);opacity:0.7} 100%{transform:scale(0);opacity:0} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }

/* L2 */
.play-btn { background:#ea580c; border:none; border-radius:50px; padding:12px 28px; font-family:inherit; font-size:17px; color:#fff; cursor:pointer; font-weight:700; box-shadow:0 4px 0 #9a3412,0 0 18px rgba(234,88,12,0.4); transition:all 0.15s; animation:bounceBtn 2s ease-in-out infinite; }
.play-btn:hover { transform:scale(1.05); }
.play-btn:active { transform:translateY(3px); box-shadow:0 1px 0 #9a3412; }
@keyframes bounceBtn { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
.signs-row { display:flex; justify-content:center; gap:14px; flex-wrap:wrap; margin-top:14px; }
.sign-post { width:68px; cursor:pointer; transition:transform 0.2s; }
.sign-post:hover { transform:scale(1.1) rotate(-3deg); }
.sign-board { background:#5c3317; border-radius:8px; width:68px; height:68px; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:900; color:#fef3c7; border:4px solid #3d1f0a; text-shadow:1px 1px 0 #3d1f0a; transition:background 0.15s; }
.sign-stick { width:8px; height:32px; background:#5c3317; margin:0 auto; border-radius:0 0 4px 4px; }
.sign-board.correct { background:#16a34a !important; animation:signPop 0.6s ease; }
.sign-board.wrong-sign { background:#dc2626 !important; animation:shake 0.4s ease; }
@keyframes signPop { 0%{transform:scale(1)} 50%{transform:scale(1.2) rotate(5deg)} 100%{transform:scale(1)} }

/* L3 */
.word-btn { display:flex; align-items:center; justify-content:center; gap:8px; background:#4338ca; border:none; border-radius:50px; padding:10px 22px; font-family:inherit; font-size:15px; color:#fff; cursor:pointer; font-weight:700; margin:0 auto 12px; box-shadow:0 3px 0 #312e81; transition:transform 0.15s; }
.word-btn:hover { transform:scale(1.05); }
.word-puzzle-box { background:rgba(5,25,8,0.8); border-radius:16px; padding:14px; margin-bottom:12px; border:2px solid rgba(74,222,128,0.3); }
.word-display { display:flex; align-items:center; justify-content:center; gap:7px; flex-wrap:wrap; margin-bottom:12px; }
.letter-tile { width:46px; height:50px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:900; border:2px solid #5c3317; background:#fef3c7; color:#3d1f0a; }
.blank-tile { width:46px; height:50px; border-radius:10px; border:3px dashed #f97316; background:rgba(249,115,22,0.1); display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:900; color:#fb923c; transition:all 0.2s; }
.blank-tile.filled { border-style:solid; border-color:#22c55e; background:rgba(34,197,94,0.15); color:#86efac; }
.blank-tile.dragover { background:rgba(250,204,21,0.2); border-color:#facc15; transform:scale(1.1); }
.vowel-chips { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-top:10px; }
.chip { width:50px; height:50px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:900; cursor:grab; border:3px solid rgba(255,255,255,0.5); color:#fff; text-shadow:1px 1px 0 rgba(0,0,0,0.4); box-shadow:0 4px 0 rgba(0,0,0,0.3); transition:transform 0.15s; user-select:none; }
.chip:hover { transform:scale(1.1) translateY(-3px); }
.chip:active { cursor:grabbing; }
.chip.used { opacity:0.3; cursor:not-allowed; pointer-events:none; }
.word-reveal { margin-top:10px; text-align:center; animation:revealPop 0.5s ease; }
@keyframes revealPop { 0%{transform:scale(0) rotate(-15deg)} 70%{transform:scale(1.15) rotate(4deg)} 100%{transform:scale(1) rotate(0)} }

/* Animals */
.animals-row { display:flex; justify-content:center; gap:20px; margin-top:10px; }
.animal { font-size:36px; display:inline-block; transition:transform 0.3s; }
.animal.happy { animation:animalDance 0.6s ease; }
@keyframes animalDance { 0%{transform:scale(1) rotate(0)} 25%{transform:scale(1.3) rotate(-10deg)} 75%{transform:scale(1.3) rotate(10deg)} 100%{transform:scale(1) rotate(0)} }

/* FEEDBACK TOAST */
.toast {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0);
  background: rgba(5,25,8,0.96);
  border-radius: 22px; padding: 22px 36px;
  text-align: center; z-index: 2000;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none; border: 3px solid #22c55e;
  min-width: 180px;
}
.toast.show { transform: translate(-50%,-50%) scale(1); }
.toast.wrong-toast { border-color: #f97316; }
.toast-emoji { font-size: 44px; margin-bottom: 6px; }
.toast-msg { font-size: 21px; font-weight: 900; color: #86efac; }
.toast.wrong-toast .toast-msg { color: #fb923c; }

/* CONFETTI */
#confetti { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1999; overflow:hidden; }
.piece { position:absolute; border-radius:2px; animation:fall 1.5s ease forwards; }
@keyframes fall { 0%{opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }

/* LEVEL COMPLETE */
.complete-card { background:rgba(5,25,8,0.9); border-radius:20px; padding:22px; text-align:center; margin:12px 0; border:3px solid #22c55e; box-shadow:0 0 35px rgba(34,197,94,0.2); max-width:500px; margin-left:auto; margin-right:auto; }
.complete-card h2 { font-size:23px; color:#86efac; text-shadow:0 0 12px rgba(74,222,128,0.5); }
.complete-card p { font-size:14px; color:#6ee7b7; margin-top:8px; }
.next-btn { margin-top:14px; background:linear-gradient(135deg,#22c55e,#16a34a); border:none; border-radius:50px; padding:12px 30px; font-family:inherit; font-size:17px; color:#fff; font-weight:900; cursor:pointer; box-shadow:0 4px 0 #14532d; transition:all 0.15s; }
.next-btn:hover { transform:scale(1.05); }
.next-btn:active { transform:translateY(3px); box-shadow:0 1px 0 #14532d; }

/* MEJA SVG */
.meja-wrap { display:inline-block; animation:revealPop 0.5s ease; }
.meja-label { color:#86efac; font-size:15px; font-weight:700; margin-top:4px; }
</style>
</head>
<body>
<div id="app">
  <!-- Forest BG -->
  <div class="forest-bg"></div>
  <div class="sky-glow"></div>
  <div id="fireflies"></div>
  <div class="vine" style="left:5%;height:110px;--vs:2.8s"></div>
  <div class="vine" style="left:15%;height:75px;--vs:3.4s"></div>
  <div class="vine" style="left:78%;height:95px;--vs:2.5s"></div>
  <div class="vine" style="left:91%;height:65px;--vs:3.1s"></div>
  <div class="vine" style="left:48%;height:55px;--vs:4s"></div>
  <div class="leaf" style="width:24px;height:16px;background:#1a6b2e;left:8%;top:38%;--lr:30deg;--lf:3.5s"></div>
  <div class="leaf" style="width:18px;height:12px;background:#15803d;left:87%;top:33%;--lr:-20deg;--lf:4.2s"></div>
  <div class="leaf" style="width:20px;height:14px;background:#166534;left:24%;top:58%;--lr:45deg;--lf:3s"></div>
  <div class="leaf" style="width:16px;height:10px;background:#1a5c1a;left:71%;top:52%;--lr:-35deg;--lf:5s"></div>
  <div class="bg-tree" style="left:0">
    <div class="bg-tree-top bg-tree-t3" style="border-left-width:55px;border-right-width:55px;border-bottom-width:80px"></div>
    <div class="bg-tree-top bg-tree-t2" style="border-left-width:55px;border-right-width:55px;border-bottom-width:96px;margin-top:-28px;margin-left:-55px"></div>
    <div class="bg-tree-top bg-tree-t1" style="border-left-width:55px;border-right-width:55px;border-bottom-width:80px;margin-top:-20px;margin-left:-55px"></div>
    <div class="bg-tree-trunk" style="width:20px;height:80px"></div>
  </div>
  <div class="bg-tree" style="right:0">
    <div class="bg-tree-top bg-tree-t3" style="border-left-width:60px;border-right-width:60px;border-bottom-width:90px"></div>
    <div class="bg-tree-top bg-tree-t2" style="border-left-width:60px;border-right-width:60px;border-bottom-width:108px;margin-top:-28px;margin-left:-60px"></div>
    <div class="bg-tree-top bg-tree-t1" style="border-left-width:60px;border-right-width:60px;border-bottom-width:90px;margin-top:-20px;margin-left:-60px"></div>
    <div class="bg-tree-trunk" style="width:22px;height:90px"></div>
  </div>
  <div class="bg-tree" style="left:17%">
    <div class="bg-tree-top bg-tree-t3" style="border-left-width:35px;border-right-width:35px;border-bottom-width:55px"></div>
    <div class="bg-tree-top bg-tree-t2" style="border-left-width:35px;border-right-width:35px;border-bottom-width:66px;margin-top:-20px;margin-left:-35px"></div>
    <div class="bg-tree-top bg-tree-t1" style="border-left-width:35px;border-right-width:35px;border-bottom-width:55px;margin-top:-16px;margin-left:-35px"></div>
    <div class="bg-tree-trunk" style="width:14px;height:55px"></div>
  </div>
  <div class="bg-tree" style="right:19%">
    <div class="bg-tree-top bg-tree-t3" style="border-left-width:40px;border-right-width:40px;border-bottom-width:65px"></div>
    <div class="bg-tree-top bg-tree-t2" style="border-left-width:40px;border-right-width:40px;border-bottom-width:78px;margin-top:-22px;margin-left:-40px"></div>
    <div class="bg-tree-top bg-tree-t1" style="border-left-width:40px;border-right-width:40px;border-bottom-width:65px;margin-top:-18px;margin-left:-40px"></div>
    <div class="bg-tree-trunk" style="width:16px;height:65px"></div>
  </div>
  <div class="ground"><div class="ground-stripe"></div></div>
  <div class="mushroom" style="left:11%"><div class="mushroom-cap" style="background:#dc2626;width:20px"></div><div class="mushroom-stem"></div></div>
  <div class="mushroom" style="left:81%"><div class="mushroom-cap" style="background:#7c3aed;width:16px"></div><div class="mushroom-stem" style="width:6px;height:6px"></div></div>
  <div class="mushroom" style="left:54%"><div class="mushroom-cap" style="background:#d97706;width:14px"></div><div class="mushroom-stem" style="width:5px;height:5px"></div></div>

  <!-- NAME SCREEN -->
  <div id="name-screen" class="screen">
    <div class="name-card">
      <div class="animal-parade">🐒 🦜 🐘 🐯 🐸</div>
      <div class="name-logo">⚡ V-Blast ⚡</div>
      <div class="name-tagline">Pengembaraan Huruf Vokal di Hutan</div>
      <div class="name-label">Nama kamu:</div>
      <input class="name-input" id="player-name" type="text" placeholder="Taip nama kamu di sini..." maxlength="20" autocomplete="off">
      <button class="start-btn" id="start-btn" onclick="startGame()" disabled>🚀 Jom Mulakan!</button>
      <div class="name-deco">✦ Vokal Blast — A · E · I · O · U ✦</div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen" style="justify-content:flex-start;padding:0;">
    <div class="game-wrapper">
      <div class="game-header">
        <div class="game-logo">⚡ V-Blast ⚡</div>
        <div class="player-tag" id="player-tag"></div>
      </div>
      <div class="scoreboard">
        <div class="score-box score-betul-box">
          <div class="score-icon">✅</div>
          <div class="score-num" id="score-betul">0</div>
          <div class="score-lbl">Betul</div>
        </div>
        <div class="score-mid">
          <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
          <div class="stars-row" id="stars-row"></div>
        </div>
        <div class="score-box score-salah-box">
          <div class="score-icon">❌</div>
          <div class="score-num" id="score-salah">0</div>
          <div class="score-lbl">Salah</div>
        </div>
      </div>
      <div class="tabs">
        <button class="tab-btn active" id="tab1" onclick="goLevel(1)">🍃 Tahap 1<br><small style="font-size:10px">Cari Vokal</small></button>
        <button class="tab-btn locked" id="tab2" onclick="goLevel(2)">🦜 Tahap 2<br><small style="font-size:10px">Dengar Bunyi</small></button>
        <button class="tab-btn locked" id="tab3" onclick="goLevel(3)">🐒 Tahap 3<br><small style="font-size:10px">Lengkap Perkataan</small></button>
      </div>
      <div class="game-content" id="game-content"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <div class="toast-emoji" id="toast-emoji">⭐</div>
    <div class="toast-msg" id="toast-msg">Bagus!</div>
  </div>

  <!-- CONFETTI -->
  <div id="confetti"></div>
</div>

<script>
// ── FIREFLIES ────────────────────────────────────────────────
(function(){
  const c=document.getElementById('fireflies');
  const cols=['#ffe066','#ffd700','#adff2f','#7fff00'];
  for(let i=0;i<20;i++){
    const f=document.createElement('div');f.className='firefly';
    f.style.cssText=`left:${5+Math.random()*90}%;top:${8+Math.random()*75}%;background:${cols[Math.floor(Math.random()*cols.length)]};--dur:${3+Math.random()*5}s;--tx:${(Math.random()-.5)*45}px;--ty:${-10-Math.random()*35}px;--tx2:${(Math.random()-.5)*22}px;--ty2:${(Math.random()-.5)*22}px;animation-delay:${Math.random()*7}s;box-shadow:0 0 7px 2px currentColor;`;
    c.appendChild(f);
  }
})();

// ── AUDIO ───────────────────────────────────────────────────
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx=null;
function getCtx(){if(!actx)actx=new AudioCtx();if(actx.state==='suspended')actx.resume();return actx;}
const FORMANTS={
  A:[{f:780,bw:80},{f:1200,bw:120}],
  E:[{f:490,bw:65},{f:1950,bw:110}],
  I:[{f:270,bw:50},{f:2450,bw:120}],
  O:[{f:490,bw:70},{f:880,bw:100}],
  U:[{f:290,bw:55},{f:680,bw:85}],
};
function playVowel(l){
  try{
    const ctx=getCtx(),now=ctx.currentTime,dur=0.75,fund=170;
    const comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-6;comp.knee.value=4;comp.ratio.value=2.5;comp.attack.value=0.002;comp.release.value=0.08;
    comp.connect(ctx.destination);
    const mg=ctx.createGain();mg.connect(comp);
    mg.gain.setValueAtTime(0,now);mg.gain.linearRampToValueAtTime(1.4,now+0.03);
    mg.gain.setValueAtTime(1.4,now+dur-0.08);mg.gain.linearRampToValueAtTime(0,now+dur);
    for(let h=1;h<=32;h++){
      const freq=fund*h;if(freq>6000)break;
      let amp=0;
      for(const {f,bw} of(FORMANTS[l]||[]))amp+=Math.exp(-0.5*Math.pow((freq-f)/bw,2));
      amp=Math.min(amp,1)*(1.5/h);if(amp<0.015)continue;
      const osc=ctx.createOscillator(),gn=ctx.createGain();
      osc.connect(gn);gn.connect(mg);osc.type='sine';osc.frequency.value=freq;
      if(h<=3){const v=ctx.createOscillator(),vg=ctx.createGain();v.frequency.value=5.5;vg.gain.value=freq*0.008;v.connect(vg);vg.connect(osc.frequency);v.start(now+0.08);v.stop(now+dur);}
      gn.gain.value=amp*0.45;osc.start(now);osc.stop(now+dur+0.05);
    }
  }catch(e){}
}
function playWord(w){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(w);u.lang='ms-MY';u.rate=0.72;u.pitch=1.1;u.volume=1;
  speechSynthesis.speak(u);
}

// ── GAME STATE ──────────────────────────────────────────────
let playerName='';
let betul=0,salah=0;
let levelDone={1:false,2:false,3:false};
let unlocked=[1];
let l1Popped=0,l2Q=[],l2Cur=0,l3Words=[],l3Idx=0,l3Fill=[],dragV=null,fbTimer=null;

const VOWELS=['A','E','I','O','U'];
const CONSONANTS=['B','C','D','F','G','H','J','K','L','M','N','P','Q','R','S','T','V','W','X','Y','Z'];
const BCOLORS=[
  {bg:'#ef4444',sh:'#991b1b',tx:'#fff'},{bg:'#f97316',sh:'#9a3412',tx:'#fff'},
  {bg:'#eab308',sh:'#854d0e',tx:'#1c1917'},{bg:'#22c55e',sh:'#14532d',tx:'#fff'},
  {bg:'#3b82f6',sh:'#1e3a8a',tx:'#fff'},{bg:'#a855f7',sh:'#581c87',tx:'#fff'},
  {bg:'#ec4899',sh:'#831843',tx:'#fff'},{bg:'#06b6d4',sh:'#155e75',tx:'#fff'},
];
const VC={A:{bg:'#ef4444'},E:{bg:'#f97316'},I:{bg:'#22c55e'},O:{bg:'#3b82f6'},U:{bg:'#a855f7'}};
const ANIMALS=['🐒','🦜','🐘','🐯','🐸'];
const WORDS=[
  {ans:['O','A'],disp:['B','_','L','_'],img:'emoji',emoji:'⚽',word:'bola'},
  {ans:['U','A'],disp:['K','_','D','_'],img:'emoji',emoji:'🐴',word:'kuda'},
  {ans:['E','U'],disp:['L','_','M','B','_'],img:'emoji',emoji:'🐄',word:'lembu'},
  {ans:['E','A'],disp:['M','_','J','_'],img:'meja',word:'meja'},
];

const MEJA_SVG=`<svg viewBox="0 0 100 65" width="100" height="65" xmlns="http://www.w3.org/2000/svg">
  <rect x="6" y="22" width="88" height="11" rx="4" fill="#a0714a"/>
  <rect x="6" y="22" width="88" height="5" rx="3" fill="#c49a6c"/>
  <rect x="12" y="33" width="9" height="26" rx="3" fill="#7a4f2e"/>
  <rect x="79" y="33" width="9" height="26" rx="3" fill="#7a4f2e"/>
  <rect x="22" y="33" width="6" height="21" rx="2" fill="#6b4226"/>
  <rect x="72" y="33" width="6" height="21" rx="2" fill="#6b4226"/>
</svg>`;

// ── NAME ENTRY ───────────────────────────────────────────────
const ni=document.getElementById('player-name');
const sb=document.getElementById('start-btn');
ni.addEventListener('input',()=>sb.disabled=ni.value.trim().length<1);
ni.addEventListener('keydown',e=>{if(e.key==='Enter'&&ni.value.trim())startGame();});

function startGame(){
  playerName=ni.value.trim();if(!playerName)return;
  document.getElementById('name-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  document.getElementById('player-tag').textContent='👤 '+playerName;
  updateStars();updateScore();renderLevel(1);
}

function shuffle(a){let r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

function updateStars(){
  const t=Object.values(levelDone).filter(Boolean).length;
  const el=document.getElementById('stars-row');
  if(el)el.innerHTML=[0,1,2].map(i=>`<span class="star-icon">${i<t?'⭐':'☆'}</span>`).join('');
}
function updateScore(jenis){
  if(jenis==='betul')betul++;
  else if(jenis==='salah')salah++;
  const jumlah=betul+salah;
  const pct=jumlah===0?0:Math.round(betul/jumlah*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  const bEl=document.getElementById('score-betul');
  const sEl=document.getElementById('score-salah');
  bEl.textContent=betul;
  sEl.textContent=salah;
  if(jenis==='betul'){bEl.classList.remove('pop');void bEl.offsetWidth;bEl.classList.add('pop');}
  if(jenis==='salah'){sEl.classList.remove('pop');void sEl.offsetWidth;sEl.classList.add('pop');}
}

function toast(correct,msg){
  const el=document.getElementById('toast');
  const msgs=correct?['Bagus!','Tahniah!','Hebat!','Betul sekali!','Pandai!']:['Cuba lagi!','Jangan menyerah!','Hampir betul!'];
  document.getElementById('toast-msg').textContent=msg||msgs[Math.floor(Math.random()*msgs.length)];
  document.getElementById('toast-emoji').textContent=correct?['⭐','🌟','🎉','🥳','🏆'][Math.floor(Math.random()*5)]:'😊';
  el.classList.toggle('wrong-toast',!correct);
  el.classList.add('show');
  if(correct)confetti();
  if(fbTimer)clearTimeout(fbTimer);
  fbTimer=setTimeout(()=>el.classList.remove('show'),1500);
}
function confetti(){
  const c=document.getElementById('confetti');c.innerHTML='';
  const cols=['#ef4444','#ffd700','#22c55e','#3b82f6','#ec4899','#f97316','#a855f7','#06b6d4'];
  for(let i=0;i<35;i++){
    const p=document.createElement('div');p.className='piece';
    p.style.cssText=`left:${Math.random()*100}%;top:-20px;background:${cols[Math.floor(Math.random()*cols.length)]};transform:rotate(${Math.random()*360}deg);width:${8+Math.random()*9}px;height:${8+Math.random()*9}px;animation-delay:${Math.random()*0.5}s;animation-duration:${1+Math.random()*0.9}s`;
    c.appendChild(p);
  }
  setTimeout(()=>c.innerHTML='',2600);
}
function animAnimals(){
  document.querySelectorAll('.animal').forEach(a=>{
    a.classList.remove('happy');void a.offsetWidth;a.classList.add('happy');
    setTimeout(()=>a.classList.remove('happy'),700);
  });
}
function goLevel(n){
  if(!unlocked.includes(n))return;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i+1===n));
  renderLevel(n);
}
function unlock(n){
  if(!unlocked.includes(n)){unlocked.push(n);document.getElementById('tab'+n).classList.remove('locked');}
}
function scoreSummaryHTML(){
  return `<div style="display:flex;justify-content:center;gap:14px;margin:10px 0 2px">
    <div style="background:rgba(34,197,94,0.15);border:2px solid rgba(34,197,94,0.4);border-radius:12px;padding:6px 18px;text-align:center">
      <div style="font-size:22px;font-weight:900;color:#86efac">${betul}</div>
      <div style="font-size:11px;color:#4ade80;font-weight:700">✅ Betul</div>
    </div>
    <div style="background:rgba(239,68,68,0.12);border:2px solid rgba(239,68,68,0.35);border-radius:12px;padding:6px 18px;text-align:center">
      <div style="font-size:22px;font-weight:900;color:#fca5a5">${salah}</div>
      <div style="font-size:11px;color:#f87171;font-weight:700">❌ Salah</div>
    </div>
  </div>`;
}
function animalsHTML(happy=false){return ANIMALS.map(a=>`<span class="animal${happy?' happy':''}">${a}</span>`).join('');}

// ── LEVEL 1 ─────────────────────────────────────────────────
function renderLevel1(){
  l1Popped=0;
  const letters=shuffle([...VOWELS,...CONSONANTS]);
  let h=`<div class="level-desc">🍃 Klik semua huruf <b>VOKAL</b> (A, E, I, O, U) yang terapung di hutan!</div>`;
  h+=`<div style="text-align:center;font-size:13px;color:#86efac;font-weight:700;margin-bottom:8px">Vokal dijumpai: <span id="vc">0</span> / 5</div>`;
  h+=`<div class="letters-grid">`;
  letters.forEach((l,i)=>{
    const isV=VOWELS.includes(l),c=BCOLORS[i%BCOLORS.length];
    h+=`<div class="balloon" id="b-${l}" style="background:${c.bg};color:${c.tx};box-shadow:0 4px 0 ${c.sh};animation-delay:${(i*.12)%2}s" onclick="clickBalloon('${l}',${isV})">${l}</div>`;
  });
  h+=`</div><div class="animals-row">${animalsHTML()}</div>`;
  document.getElementById('game-content').innerHTML=h;
}
function clickBalloon(l,isV){
  const el=document.getElementById('b-'+l);if(!el)return;
  if(isV){
    el.classList.add('popped');l1Popped++;
    document.getElementById('vc').textContent=l1Popped;
    updateScore('betul');toast(true);animAnimals();playVowel(l);
    if(l1Popped>=5){
      levelDone[1]=true;updateStars();unlock(2);
      setTimeout(()=>{
        document.getElementById('game-content').innerHTML=`
          <div class="complete-card"><div style="font-size:50px">🎉</div><h2>Tahap 1 Selesai!</h2><p>Bagus, ${playerName}! Kamu berjaya mencari semua 5 huruf vokal!</p>${scoreSummaryHTML()}<button class="next-btn" onclick="goLevel(2)">Teruskan ke Tahap 2 🦜</button></div>
          <div class="animals-row" style="margin-top:14px">${animalsHTML(true)}</div>`;
        confetti();
      },800);
    }
  } else {
    el.classList.add('wrong-shake');setTimeout(()=>el.classList.remove('wrong-shake'),500);
    toast(false,'Cuba lagi! Cari huruf A, E, I, O atau U!');
    updateScore('salah');
  }
}

// ── LEVEL 2 ─────────────────────────────────────────────────
function renderLevel2(){l2Q=shuffle([...VOWELS]);l2Cur=0;renderL2();}
function renderL2(){
  if(l2Cur>=5){
    levelDone[2]=true;updateStars();unlock(3);
    document.getElementById('game-content').innerHTML=`
      <div class="complete-card"><div style="font-size:50px">🦜</div><h2>Tahap 2 Selesai!</h2><p>Syabas, ${playerName}! Kamu pandai mendengar bunyi vokal!</p>${scoreSummaryHTML()}<button class="next-btn" onclick="goLevel(3)">Teruskan ke Tahap 3 🐒</button></div>
      <div class="animals-row" style="margin-top:14px">${animalsHTML(true)}</div>`;
    confetti();return;
  }
  const target=l2Q[l2Cur%5];
  let h=`<div class="level-desc">🦜 Dengar bunyi huruf, kemudian klik huruf vokal yang betul!</div>
    <div style="text-align:center;font-size:13px;color:#86efac;font-weight:700;margin-bottom:10px">Soalan ${l2Cur+1} / 5</div>
    <div style="text-align:center;margin-bottom:14px">
      <button class="play-btn" onclick="playVowel('${target}')">🔊 Dengar Bunyi Huruf</button>
      <div style="font-size:13px;color:#6ee7b7;margin-top:6px;font-weight:700">Klik huruf yang kamu dengar!</div>
    </div>
    <div class="signs-row">`;
  shuffle([...VOWELS]).forEach(v=>{
    const c=VC[v];
    h+=`<div class="sign-post" onclick="answerL2('${v}','${target}')"><div class="sign-board" id="sign-${v}" style="background:${c.bg};color:#fff">${v}</div><div class="sign-stick"></div></div>`;
  });
  h+=`</div><div class="animals-row" style="margin-top:12px">${animalsHTML()}</div>`;
  document.getElementById('game-content').innerHTML=h;
  setTimeout(()=>playVowel(target),600);
}
function answerL2(chosen,target){
  const el=document.getElementById('sign-'+chosen);if(!el)return;
  if(chosen===target){
    el.classList.add('correct');updateScore('betul');toast(true);animAnimals();
    playVowel(chosen);l2Cur++;setTimeout(renderL2,1400);
  } else {
    el.classList.add('wrong-sign');toast(false,'Cuba lagi! Dengar baik-baik!');
    updateScore('salah');
    setTimeout(()=>el.classList.remove('wrong-sign'),600);
  }
}

// ── LEVEL 3 ─────────────────────────────────────────────────
function renderLevel3(){l3Idx=0;l3Words=shuffle(WORDS);renderL3();}
function renderL3(){
  if(l3Idx>=4){
    levelDone[3]=true;updateStars();
    const jumlah=betul+salah;
    const pct=jumlah===0?0:Math.round(betul/jumlah*100);
    const gred=pct>=90?'🏆 Cemerlang!':pct>=70?'⭐ Bagus!':pct>=50?'👍 Teruskan usaha!':'💪 Jangan putus asa!';
    document.getElementById('game-content').innerHTML=`
      <div class="complete-card">
        <div style="font-size:50px">🏆</div>
        <h2>Tahniah, ${playerName}!</h2>
        <p>Kamu seorang murid yang cemerlang!<br>Kamu tahu semua huruf vokal A, E, I, O, U!</p>
        <div style="display:flex;justify-content:center;gap:14px;margin:12px 0 4px">
          <div style="background:rgba(34,197,94,0.15);border:2px solid rgba(34,197,94,0.4);border-radius:12px;padding:8px 20px;text-align:center">
            <div style="font-size:28px;font-weight:900;color:#86efac">${betul}</div>
            <div style="font-size:11px;color:#4ade80;font-weight:700">✅ Betul</div>
          </div>
          <div style="background:rgba(239,68,68,0.12);border:2px solid rgba(239,68,68,0.35);border-radius:12px;padding:8px 20px;text-align:center">
            <div style="font-size:28px;font-weight:900;color:#fca5a5">${salah}</div>
            <div style="font-size:11px;color:#f87171;font-weight:700">❌ Salah</div>
          </div>
          <div style="background:rgba(250,204,21,0.12);border:2px solid rgba(250,204,21,0.4);border-radius:12px;padding:8px 20px;text-align:center">
            <div style="font-size:28px;font-weight:900;color:#fde047">${pct}%</div>
            <div style="font-size:11px;color:#facc15;font-weight:700">🎯 Tepat</div>
          </div>
        </div>
        <div style="font-size:16px;color:#86efac;font-weight:700;margin-bottom:10px">${gred}</div>
        <button class="next-btn" onclick="restartGame()">🔄 Main Semula</button>
      </div>
      <div class="animals-row" style="margin-top:14px">${animalsHTML(true)}</div>`;
    confetti();return;
  }
  const w=l3Words[l3Idx];
  l3Fill=w.ans.map(()=>null);dragV=null;
  let bi=0;
  let h=`<div class="level-desc">🐒 Dengar perkataan dan seret huruf vokal ke tempat yang betul!</div>
    <div style="text-align:center;font-size:13px;color:#86efac;font-weight:700;margin-bottom:8px">Perkataan ${l3Idx+1} / 4</div>
    <button class="word-btn" onclick="playWord('${w.word}')">🔊 Dengar Perkataan</button>
    <div class="word-puzzle-box"><div class="word-display">`;
  w.disp.forEach(ch=>{
    if(ch==='_'){const idx=bi++;h+=`<div class="blank-tile" id="bt-${idx}" ondragover="dOver(event,${idx})" ondrop="dDrop(event,${idx})" ondragleave="dLeave(event,${idx})"></div>`;}
    else h+=`<div class="letter-tile">${ch}</div>`;
  });
  h+=`</div><div id="word-reveal"></div></div><div class="vowel-chips">`;
  shuffle([...VOWELS]).forEach(v=>{
    const c=VC[v];
    h+=`<div class="chip" id="chip-${v}" draggable="true" style="background:${c.bg};box-shadow:0 4px 0 rgba(0,0,0,0.35)" ondragstart="dStart(event,'${v}')" onclick="tapChip('${v}')">${v}</div>`;
  });
  h+=`</div><div class="animals-row" style="margin-top:10px">${animalsHTML()}</div>`;
  document.getElementById('game-content').innerHTML=h;
  setTimeout(()=>playWord(w.word),400);
}
function dStart(e,v){dragV=v;e.dataTransfer.setData('text/plain',v);}
function dOver(e,i){e.preventDefault();document.getElementById('bt-'+i).classList.add('dragover');}
function dLeave(e,i){document.getElementById('bt-'+i).classList.remove('dragover');}
function dDrop(e,i){e.preventDefault();const v=e.dataTransfer.getData('text/plain')||dragV;document.getElementById('bt-'+i).classList.remove('dragover');placeV(v,i);}
function tapChip(v){const bs=document.querySelectorAll('.blank-tile:not(.filled)');if(!bs.length)return;placeV(v,parseInt(bs[0].id.replace('bt-','')));}
function placeV(v,i){
  const w=l3Words[l3Idx];
  const el=document.getElementById('bt-'+i);
  if(!el||el.classList.contains('filled'))return;
  if(v===w.ans[i]){
    l3Fill[i]=v;el.textContent=v;el.classList.add('filled');
    const ch=document.getElementById('chip-'+v);if(ch)ch.classList.add('used');
    playVowel(v);
    if(l3Fill.every(x=>x!==null)){
      updateScore('betul');toast(true,'Bagus! Perkataan betul!');animAnimals();
      const rev=document.getElementById('word-reveal');
      if(w.img==='meja'){
        rev.innerHTML=`<div class="word-reveal"><div class="meja-wrap">${MEJA_SVG}</div><div class="meja-label">meja</div></div>`;
      } else {
        rev.innerHTML=`<div class="word-reveal" style="font-size:56px">${w.emoji}</div>`;
      }
      setTimeout(()=>playWord(w.word),400);
      l3Idx++;setTimeout(renderL3,2200);
    }
  } else {
    el.style.background='rgba(239,68,68,0.2)';toast(false,'Cuba lagi! Huruf vokal yang mana satu?');
    updateScore('salah');
    setTimeout(()=>el.style.background='',600);
  }
}
function restartGame(){
  betul=0;salah=0;levelDone={1:false,2:false,3:false};unlocked=[1];l1Popped=0;
  updateScore();updateStars();
  document.getElementById('tab2').classList.add('locked');
  document.getElementById('tab3').classList.add('locked');
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  renderLevel(1);
}
function renderLevel(n){if(n===1)renderLevel1();else if(n===2)renderLevel2();else if(n===3)renderLevel3();}
</script>
</body>
</html>
